{% extends "base.html" %}
{% block title %}Eliminar meta · FinTrack{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>Eliminar meta</h1>
    <p>¿Estás seguro de que deseas eliminar la meta <strong>{{ object.nombre }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <a href="{% url 'core:goal_list' %}" class="btn">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
