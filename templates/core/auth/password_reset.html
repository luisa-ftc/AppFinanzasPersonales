{% extends "base.html" %}
{% block title %}Recuperar contraseña · FinTrack{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Recuperar contraseña</h1>
    <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block">Enviar enlace</button>
    </form>
    <p class="auth-links"><a href="{% url 'core:login' %}">Volver al login</a></p>
</div>
{% endblock %}
