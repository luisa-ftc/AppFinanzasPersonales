{% extends "base.html" %}
{% block title %}Nueva contraseña · FinTrack{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Nueva contraseña</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block">Cambiar contraseña</button>
    </form>
</div>
{% endblock %}
