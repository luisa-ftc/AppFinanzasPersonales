{% extends "base.html" %}
{% block title %}{% if object %}Editar{% else %}Nueva{% endif %} cuenta · FinTrack{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>{% if object %}Editar cuenta{% else %}Nueva cuenta{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'core:account_list' %}" class="btn">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
